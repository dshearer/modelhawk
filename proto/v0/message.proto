syntax = "proto3";
package modelhawk.v0;

import "google/protobuf/timestamp.proto";
import "tool_info.proto";

option go_package = "github.com/dshearer/modelhawk/gen/go/v0";

/**
 * A message sent from or to an AI model.
 */
message Message {
    optional string role = 1;
    repeated MessageContent contents = 2;
}

message MessageContent {
    oneof content {
        ThinkingContent thinking = 1;
        ToolCallContent tool_call = 2;
        ToolResultContent tool_result = 3;
        TextContent text = 4;
    }
}

message ThinkingContent {
    optional google.protobuf.Timestamp timestamp = 1;
    optional string content = 2;
}

message ToolCallContent {
    optional google.protobuf.Timestamp timestamp = 1;
    optional ToolInfo tool = 2;
    map<string, string> args = 3;
}

message ToolResultContent {
    optional google.protobuf.Timestamp timestamp = 1;
    optional string tool_name = 2;
    optional string result = 3;
    optional bool is_error = 4;
}

message TextContent {
    optional google.protobuf.Timestamp timestamp = 1;
    optional string content = 2;
}