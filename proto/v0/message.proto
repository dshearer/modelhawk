syntax = "proto3";
package modelhawk.v0;

import "google/protobuf/timestamp.proto";
import "tool_info.proto";

option go_package = "github.com/dshearer/modelhawk/gen/go/v0";

/**
 * A message sent from or to an AI model.
 */
message Message {
    oneof msg {
        SystemMessage system_message = 1;
        UserMessage user_message = 2;
        AssistantMessage assistant_message = 3;
        ToolResultMessage tool_result_message = 4;
    }
    optional google.protobuf.Timestamp timestamp = 5;
}

message SystemMessage {
    repeated MessageContent contents = 1;
}

message UserMessage {
    repeated MessageContent contents = 1;
}

message AssistantMessage {
    repeated MessageContent contents = 1;
    optional string provider = 2;
    optional string model = 3;
    optional string stop_reason = 4;
}

message ToolResultMessage {
    repeated MessageContent contents = 1;
    optional string tool_name = 2;
    optional bool is_error = 3;
}

message MessageContent {
    oneof content {
        ThinkingContent thinking = 1;
        ToolCallContent tool_call = 2;
        ToolResultContent tool_result = 3;
        TextContent text = 4;
    }
}

message ThinkingContent {
    optional string content = 1;
}

message ToolCallContent {
    optional ToolInfo tool = 1;
    map<string, string> args = 2;
}

message ToolResultContent {
    optional string tool_name = 1;
    optional string result = 2;
    optional bool is_error = 3;
}

message TextContent {
    optional string content = 1;
}